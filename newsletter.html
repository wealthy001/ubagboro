<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter | Ubagboro Community</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <h1>Ubagboro</h1>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="newsletter.html" class="active">Newsletter</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h2>Stay Connected</h2>
            <p>Subscribe to our newsletter for the latest updates and community news.</p>
        </section>

        <section class="content-section">
            <div class="form-container">
                <form action="/subscribe" method="POST" class="newsletter-form">
                    
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" required placeholder="Enter your first name">
                    </div>

                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" required placeholder="Enter your last name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email address">
                    </div>

                    <button type="submit" class="btn btn-primary submit-btn">Subscribe Now</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Ubagboro Community, Warri. All Rights Reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
